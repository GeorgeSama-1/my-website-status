<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f4ef" />
    <meta name="description" content="George Hu 网站运行状态" />
    <title>George Hu Status</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f4ef;
        color: #1d211f;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #f5f4ef; }
      a { color: inherit; }
      main { width: min(100% - 32px, 780px); margin: 0 auto; padding: 64px 0 48px; }
      header { margin-bottom: 32px; }
      .eyebrow { margin: 0 0 12px; color: #68706c; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(30px, 6vw, 48px); font-weight: 650; letter-spacing: -.04em; }
      .summary { margin: 16px 0 0; color: #68706c; font-size: 15px; line-height: 1.7; }
      .overall { display: flex; align-items: center; gap: 12px; margin: 28px 0 22px; border: 1px solid #d8d8d0; border-radius: 14px; background: #fff; padding: 18px 20px; }
      .dot { width: 11px; height: 11px; flex: 0 0 auto; border-radius: 50%; background: #979d99; box-shadow: 0 0 0 5px #eef0ee; }
      .overall[data-status="up"] .dot, .service[data-status="up"] .dot { background: #27865a; box-shadow: 0 0 0 5px #e5f3eb; }
      .overall[data-status="down"] .dot, .service[data-status="down"] .dot { background: #c33f43; box-shadow: 0 0 0 5px #f9e8e8; }
      .overall strong { font-size: 16px; }
      .overall span:last-child { margin-left: auto; color: #7a817d; font-size: 12px; }
      .services { display: grid; gap: 12px; }
      .service { border: 1px solid #d8d8d0; border-radius: 14px; background: #fff; padding: 20px; }
      .service-head { display: flex; align-items: center; gap: 11px; }
      .service-head h2 { margin: 0; font-size: 16px; font-weight: 620; }
      .status-label { margin-left: auto; color: #68706c; font-size: 13px; }
      .metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 20px; }
      .metric { border-top: 1px solid #ecece7; padding-top: 13px; }
      .metric span { display: block; color: #858b87; font-size: 11px; }
      .metric strong { display: block; margin-top: 5px; font-size: 14px; font-weight: 600; }
      .error { border: 1px solid #e7c5c5; border-radius: 14px; background: #fff7f7; padding: 18px; color: #9a3438; }
      footer { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-top: 30px; color: #757c78; font-size: 12px; }
      footer a:hover { color: #1d211f; }
      @media (max-width: 560px) {
        main { padding-top: 36px; }
        .overall { align-items: flex-start; }
        .overall span:last-child { margin-left: 0; }
        .metrics { grid-template-columns: 1fr; gap: 8px; }
        .metric { display: flex; justify-content: space-between; }
        footer { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">George Hu · Status</p>
        <h1>网站运行状态</h1>
        <p class="summary">由 GitHub Actions 定期检测。此页面读取同源静态快照，不调用 GitHub API，也不需要任何访问令牌。</p>
      </header>

      <section class="overall" id="overall" data-status="unknown" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <strong id="overall-label">正在读取最新状态…</strong>
        <span id="updated-at"></span>
      </section>

      <section class="services" id="services" aria-label="服务状态"></section>

      <footer>
        <a href="https://geohu.com/">返回 geohu.com</a>
        <a href="https://github.com/GeorgeSama-1/my-website-status">查看公开监控记录</a>
        <span>Powered by Upptime data</span>
      </footer>
    </main>

    <script>
      const overall = document.querySelector("#overall");
      const overallLabel = document.querySelector("#overall-label");
      const updatedAt = document.querySelector("#updated-at");
      const services = document.querySelector("#services");

      const statusText = { up: "运行正常", down: "服务异常", degraded: "性能下降", unknown: "状态未知" };
      const metric = (label, value) => {
        const item = document.createElement("div");
        item.className = "metric";
        const name = document.createElement("span");
        name.textContent = label;
        const result = document.createElement("strong");
        result.textContent = value;
        item.append(name, result);
        return item;
      };

      fetch(`./status.json?v=${Date.now()}`, { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error("status snapshot unavailable");
          return response.json();
        })
        .then((snapshot) => {
          const allUp = snapshot.services.length > 0 && snapshot.services.every((service) => service.status === "up");
          const hasDown = snapshot.services.some((service) => service.status === "down");
          const overallStatus = allUp ? "up" : hasDown ? "down" : "degraded";
          overall.dataset.status = overallStatus;
          overallLabel.textContent = allUp ? "所有服务运行正常" : hasDown ? "部分服务发生故障" : "部分服务状态异常";
          updatedAt.textContent = `更新于 ${new Date(snapshot.generatedAt).toLocaleString("zh-CN", { hour12: false })}`;

          snapshot.services.forEach((service) => {
            const card = document.createElement("article");
            card.className = "service";
            card.dataset.status = service.status;

            const head = document.createElement("div");
            head.className = "service-head";
            const dot = document.createElement("span");
            dot.className = "dot";
            dot.setAttribute("aria-hidden", "true");
            const title = document.createElement("h2");
            title.textContent = service.name;
            const label = document.createElement("span");
            label.className = "status-label";
            label.textContent = statusText[service.status] || statusText.unknown;
            head.append(dot, title, label);

            const metrics = document.createElement("div");
            metrics.className = "metrics";
            metrics.append(
              metric("响应时间", service.responseTime ? `${service.responseTime} ms` : "—"),
              metric("今日可用率", service.uptimeDay),
              metric("本月可用率", service.uptimeMonth),
            );
            card.append(head, metrics);
            services.append(card);
          });
        })
        .catch(() => {
          overall.hidden = true;
          services.className = "error";
          services.textContent = "状态快照暂时无法读取，请稍后刷新。无需填写或提供任何 GitHub Token。";
        });
    </script>
  </body>
</html>
